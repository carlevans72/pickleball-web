    <script>
      (function () {
        var carousel = document.querySelector("[data-carousel]");
        if (!carousel) return;

        var track = carousel.querySelector("[data-carousel-track]");
        var prev = carousel.querySelector("[data-carousel-prev]");
        var next = carousel.querySelector("[data-carousel-next]");
        var dotsWrap = carousel.querySelector("[data-carousel-dots]");
        var slides = Array.prototype.slice.call(track.children);
        if (!slides.length) return;

        var current = 0;

        function clamp(i) {
          return Math.max(0, Math.min(slides.length - 1, i));
        }

        function scrollToSlide(i) {
          var slide = slides[i];
          var offset =
            slide.offsetLeft - (track.clientWidth - slide.offsetWidth) / 2;
          var max = track.scrollWidth - track.clientWidth;
          track.scrollTo({
            left: Math.max(0, Math.min(max, offset)),
            behavior: "smooth"
          });
        }

        function nearestIndex() {
          if (track.scrollLeft <= 1) return 0;
          if (track.scrollLeft + track.clientWidth >= track.scrollWidth - 1) {
            return slides.length - 1;
          }
          var center = track.scrollLeft + track.clientWidth / 2;
          var best = 0;
          var bestDist = Infinity;
          slides.forEach(function (slide, i) {
            var slideCenter = slide.offsetLeft + slide.offsetWidth / 2;
            var dist = Math.abs(slideCenter - center);
            if (dist < bestDist) {
              bestDist = dist;
              best = i;
            }
          });
          return best;
        }

        function render() {
          dots.forEach(function (dot, d) {
            dot.classList.toggle("is-active", d === current);
          });
          prev.classList.toggle("is-edge", current <= 0);
          next.classList.toggle("is-edge", current >= slides.length - 1);
        }

        var programmatic = false;

        function go(i) {
          current = clamp(i);
          programmatic = true;
          scrollToSlide(current);
          render();
        }

        var dots = slides.map(function (slide, i) {
          var dot = document.createElement("button");
          dot.type = "button";
          dot.className = "carousel-dot";
          dot.setAttribute("aria-label", "Go to screenshot " + (i + 1));
          dot.addEventListener("click", function () {
            go(i);
          });
          dotsWrap.appendChild(dot);
          return dot;
        });

        prev.addEventListener("click", function () { go(current - 1); });
        next.addEventListener("click", function () { go(current + 1); });

        var ticking = false;
        var settleTimer;
        track.addEventListener("scroll", function () {
          clearTimeout(settleTimer);
          // While an arrow/dot scroll is animating, keep the index the button
          // set; only sync from scroll position for manual swipes/drags.
          if (!programmatic && !ticking) {
            ticking = true;
            window.requestAnimationFrame(function () {
              current = nearestIndex();
              render();
              ticking = false;
            });
          }
          // Once scrolling has settled, reconcile and re-enable manual sync.
          settleTimer = setTimeout(function () {
            programmatic = false;
            current = nearestIndex();
            render();
          }, 120);
        });
        window.addEventListener("resize", function () {
          // Slide width tracks the viewport, so re-align the focused slide.
          programmatic = true;
          track.scrollLeft = slides[current].offsetLeft;
          render();
        });
        render();
      })();
    </script>
